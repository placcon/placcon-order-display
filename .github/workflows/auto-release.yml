name: Auto Release

on:
  push:
    branches: [ main, master, electron-v2 ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.8.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Get version from package.json
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "Package.json version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if release already exists
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        TAG="v$VERSION"
        echo "Checking if release for tag $TAG already exists..."
        
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "❌ Release for tag $TAG already exists!"
          echo "Please use a different version or delete the existing release first."
          exit 1
        else
          echo "✅ No existing release found for tag $TAG"
          echo "Proceeding with build and release..."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: check-and-release
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:mac
    - name: List build outputs
      shell: bash
      run: find ./dist -maxdepth 1 -type f | sort
    - uses: actions/upload-artifact@v4
      with:
        name: placcon-launcher-mac
        path: dist/*.dmg
        retention-days: 0

  build-win-x64:
    needs: check-and-release
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:win
    - name: List build outputs
      shell: bash
      run: find ./dist -maxdepth 1 -type f | sort
    - uses: actions/upload-artifact@v4
      with:
        name: placcon-launcher-win-x64
        path: dist/*.exe
        retention-days: 0

  build-win-ia32:
    needs: check-and-release
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:win32
    - name: List build outputs
      shell: bash
      run: find ./dist -maxdepth 1 -type f | sort
    - uses: actions/upload-artifact@v4
      with:
        name: placcon-launcher-win-ia32
        path: dist/*.exe
        retention-days: 0

  build-linux:
    needs: check-and-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:linux
    - name: List build outputs
      shell: bash
      run: find ./dist -maxdepth 1 -type f | sort
    - uses: actions/upload-artifact@v4
      with:
        name: placcon-launcher-linux
        path: dist/*.deb
        retention-days: 0

  create-release:
    needs: [build-mac, build-win-x64, build-win-ia32, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from package.json
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "Version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List all artifacts
      shell: bash
      run: |
        echo "=== All downloaded artifact files ==="
        find artifacts -type f | sort
        echo ""
        echo "=== Installer files that will be uploaded to release ==="
        find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) | sort
        echo ""
        echo "=== File sizes ==="
        find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) -exec ls -lh {} \; | awk '{print $5, $9}' | sort

    - name: Create Release
      shell: bash
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        TAG="v$VERSION"
        echo "Creating release for tag: $TAG"

        # Csak a telepítő fájlok, unpacked mappák nélkül
        mapfile -t FILES < <(find artifacts -type f \( -name "*.dmg" -o -name "*.deb" \) -o \( -type f -name "*.exe" -not -path "*/win-*-unpacked/*" -not -path "*/win-unpacked/*" \) | sort)
        echo "Files to upload:"
        printf '%s\n' "${FILES[@]}"

        RELEASE_NOTES="Placcon Launcher $VERSION - Automated release with macOS ARM64, Windows Setup, and Linux DEB packages"
        gh release create "$TAG" \
          --title "Placcon Launcher $VERSION" \
          --notes "$RELEASE_NOTES" \
          --draft=false \
          --prerelease=false \
          "${FILES[@]}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 