name: Auto Release

on:
  push:
    branches: [ main, master, electron-v2 ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.8.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Get version from package.json
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "Package.json version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if release already exists
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        TAG="v$VERSION"
        echo "Checking if release for tag $TAG already exists..."
        
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "❌ Release for tag $TAG already exists!"
          echo "Please use a different version or delete the existing release first."
          exit 1
        else
          echo "✅ No existing release found for tag $TAG"
          echo "Proceeding with build and release..."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-all:
    needs: check-and-release
    strategy:
      matrix:
        platform: [mac, win, linux]
        include:
          - platform: mac
            runner: macos-latest
            extension: dmg
          - platform: win
            runner: windows-latest
            extension: exe
          - platform: linux
            runner: ubuntu-latest
            extension: deb
    
    runs-on: ${{ matrix.runner }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get version from package.json
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "Version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build for ${{ matrix.platform }}
      run: npm run build:${{ matrix.platform }}

    - name: List build outputs
      shell: bash
      run: |
        echo "Build outputs for ${{ matrix.platform }}:"
        if [ -d "./dist" ]; then
          ls -la ./dist/ || echo "Could not list dist directory"
          find ./dist -type f 2>/dev/null | head -20 || echo "Could not find files in dist directory"
        else
          echo "dist directory not found"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: placcon-launcher-${{ matrix.platform }}
        path: dist/
        retention-days: 0

  create-release:
    needs: build-all
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from package.json
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "Version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List all artifacts
      shell: bash
      run: |
        echo "All downloaded artifacts:"
        find artifacts -type f | sort

    - name: Create Release
      shell: bash
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        TAG="v$VERSION"
        echo "Creating release for tag: $TAG"

        FILES=$(find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) | sort)
        echo "Files to upload:"
        echo "$FILES"

        RELEASE_NOTES="Placcon Launcher $VERSION - Automated release with macOS ARM64, Windows Setup, and Linux DEB packages"
        gh release create "$TAG" \
          --title "Placcon Launcher $VERSION" \
          --notes "$RELEASE_NOTES" \
          --draft=false \
          --prerelease=false \
          $FILES
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 